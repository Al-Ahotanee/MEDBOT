<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediBot - AI & NLP Symptom Checker</title>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Inter"', 'sans-serif'] },
                    colors: {
                        brand: { 50: '#f0f9ff', 100: '#e0f2fe', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1', 900: '#0c4a6e' }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .typing-dot { animation: typing 1.4s infinite both; }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing { 0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); } 40% { opacity: 1; transform: scale(1); } }

        .markdown p { margin-bottom: 0.5rem; }
        .markdown p:last-child { margin-bottom: 0; }
        .markdown strong { font-weight: 700; color: #0f172a; }
        .markdown em { font-style: italic; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Subtle Grid Background for Landing Page */
        .bg-grid {
            background-size: 40px 40px;
            background-image: linear-gradient(to right, rgba(15, 23, 42, 0.05) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(15, 23, 42, 0.05) 1px, transparent 1px);
        }
    </style>
</head>
<body>
    <div id="root" class="h-screen w-full flex flex-col"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                "stethoscope": '<path d="M11 2v2a5 5 0 0 0 5 5h0a5 5 0 0 0 5-5V2"/><path d="M16 9v10"/><circle cx="16" cy="21" r="2"/><path d="M4 14a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z"/><path d="M4 14v4a2 2 0 0 0 2 2h4"/>',
                "zap": '<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>',
                "arrow-right": '<path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>',
                "brain-circuit": '<path d="M12 4.5a2.5 2.5 0 0 0-4.96-.46 2.5 2.5 0 0 0-1.98 3 2.5 2.5 0 0 0-1.32 4.24 3 3 0 0 0 .34 5.58 2.5 2.5 0 0 0 2.96 3.08 2.5 2.5 0 0 0 4.91.05L12 20V4.5Z"/><path d="M16 8V5c0-1.1.9-2 2-2"/><path d="M12 13h4"/><path d="M12 18h6a2 2 0 0 1 2 2v1"/><path d="M12 8h8"/><path d="M20.5 8a.5.5 0 1 1-1 0 .5.5 0 0 1 1 0Z"/><path d="M16.5 13a.5.5 0 1 1-1 0 .5.5 0 0 1 1 0Z"/><path d="M20.5 21a.5.5 0 1 1-1 0 .5.5 0 0 1 1 0Z"/><path d="M18.5 3a.5.5 0 1 1-1 0 .5.5 0 0 1 1 0Z"/>',
                "server-crash": '<path d="M6 4h12a2 2 0 0 1 2 2v4a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"/><path d="M6 14h12a2 2 0 0 1 2 2v4a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-4a2 2 0 0 1 2-2z"/><path d="m13 6-4 6h6l-4 6"/>',
                "shield-check": '<path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2-1 4-2 7-2 2.82 0 5.17 1 7 2a1 1 0 0 1 1 1v7z"/><path d="m9 12 2 2 4-4"/>',
                "arrow-left": '<path d="m12 19-7-7 7-7"/><path d="M19 12H5"/>',
                "lock-keyhole": '<circle cx="12" cy="16" r="1"/><rect x="3" y="10" width="18" height="12" rx="2"/><path d="M7 10V7a5 5 0 0 1 10 0v3"/>',
                "user-plus": '<path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/>',
                "triangle-alert": '<path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/>',
                "user": '<path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>',
                "key": '<path d="m15.5 7.5 2.3 2.3a1 1 0 0 0 1.4 0l2.1-2.1a1 1 0 0 0 0-1.4L19 4"/><path d="m21 2-9.6 9.6"/><circle cx="7.5" cy="15.5" r="5.5"/>',
                "loader-circle": '<path d="M21 12a9 9 0 1 1-6.219-8.56"/>',
                "clipboard-list": '<rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M12 11h4"/><path d="M12 16h4"/><path d="M8 11h.01"/><path d="M8 16h.01"/>',
                "server": '<rect width="20" height="8" x="2" y="2" rx="2" ry="2"/><rect width="20" height="8" x="2" y="14" rx="2" ry="2"/><line x1="6" x2="6.01" y1="6" y2="6"/><line x1="6" x2="6.01" y1="18" y2="18"/>',
                "log-out": '<path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>',
                "bot": '<path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/>',
                "circle-x": '<circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/>',
                "database": '<ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5V19A9 3 0 0 0 21 19V5"/><path d="M3 12A9 3 0 0 0 21 12"/>',
                "clipboard-plus": '<rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M9 14h6"/><path d="M12 11v6"/>',
                "send": '<path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/>',
                "message-square": '<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>',
                "trash-2": '<path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/>'
            };

            const svgContent = icons[name] || '<circle cx="12" cy="12" r="10"/>';
            return (
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width={size}
                    height={size}
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    strokeWidth="2"
                    strokeLinecap="round"
                    strokeLinejoin="round"
                    className={className}
                    dangerouslySetInnerHTML={{ __html: svgContent }}
                />
            );
        };

        const LandingPage = ({ setView }) => (
            <div className="flex-1 overflow-y-auto bg-white bg-grid relative flex flex-col">
                <header className="absolute top-0 left-0 right-0 px-6 py-6 flex justify-between items-center z-20">
                    <div className="flex items-center space-x-2 text-brand-900">
                        <div className="p-2 bg-brand-500 rounded-lg text-white shadow-md"><Icon name="stethoscope" size={24} /></div>
                        <span className="font-extrabold text-2xl tracking-tight">MediBot</span>
                    </div>
                    <nav className="space-x-3 flex items-center">
                        <button onClick={() => setView('login')} className="text-slate-600 hover:text-brand-900 font-semibold px-4 py-2 transition">Log in</button>
                        <button onClick={() => setView('signup')} className="bg-brand-900 text-white px-5 py-2.5 rounded-full font-semibold hover:bg-brand-700 shadow-lg transition">Start Free</button>
                    </nav>
                </header>

                <main className="flex-1 flex flex-col items-center justify-center text-center px-4 pt-32 pb-20 relative z-10">
                    <div className="inline-flex items-center px-4 py-2 rounded-full bg-brand-50 border border-brand-100 text-brand-700 font-semibold text-xs mb-8 uppercase tracking-widest shadow-sm">
                        <Icon name="zap" size={14} className="mr-2 text-brand-500" /> Dual-Engine Diagnosis Active
                    </div>
                    <h1 className="text-5xl md:text-7xl font-extrabold text-slate-900 tracking-tight max-w-4xl mb-6 leading-tight">
                        Professional symptom checker, <br/>
                        <span className="text-transparent bg-clip-text bg-gradient-to-r from-brand-500 to-brand-900">powered by advanced AI.</span>
                    </h1>
                    <p className="text-lg md:text-xl text-slate-600 max-w-2xl mb-10 font-medium">
                        Describe your symptoms to receive instant, reliable insights regarding potential conditions. Switch between our Gemini AI Engine and our robust Offline NLP System seamlessly.
                    </p>
                    <div className="flex flex-col sm:flex-row gap-4">
                        <button onClick={() => setView('signup')} className="bg-brand-900 text-white px-8 py-4 rounded-full font-bold text-lg hover:bg-brand-800 transition shadow-xl shadow-brand-900/20 flex items-center justify-center">
                            Launch Diagnosis Engine <Icon name="arrow-right" size={20} className="ml-2" />
                        </button>
                    </div>
                </main>

                <section className="bg-slate-50 py-20 px-6 border-t border-slate-200">
                    <div className="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-10">
                        <div className="bg-white p-8 rounded-3xl shadow-sm border border-slate-100">
                            <div className="w-14 h-14 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center mb-6"><Icon name="brain-circuit" size={28} /></div>
                            <h3 className="text-xl font-bold text-slate-900 mb-3">Gemini AI Engine</h3>
                            <p className="text-slate-600 font-medium">Leverages Google's cutting-edge Gemini model for nuanced, conversational symptom analysis and detailed medical context.</p>
                        </div>
                        <div className="bg-white p-8 rounded-3xl shadow-sm border border-slate-100">
                            <div className="w-14 h-14 bg-emerald-100 text-emerald-600 rounded-2xl flex items-center justify-center mb-6"><Icon name="server-crash" size={28} /></div>
                            <h3 className="text-xl font-bold text-slate-900 mb-3">Offline NLP Built-in</h3>
                            <p className="text-slate-600 font-medium">A robust, template-driven diagnostic wizard that works instantly even when external AI APIs are down or restricted.</p>
                        </div>
                        <div className="bg-white p-8 rounded-3xl shadow-sm border border-slate-100">
                            <div className="w-14 h-14 bg-purple-100 text-purple-600 rounded-2xl flex items-center justify-center mb-6"><Icon name="shield-check" size={28} /></div>
                            <h3 className="text-xl font-bold text-slate-900 mb-3">Secure Knowledge Base</h3>
                            <p className="text-slate-600 font-medium">All AI responses are cached securely in a local database, speeding up response times for frequently asked medical questions.</p>
                        </div>
                    </div>
                </section>
            </div>
        );

        const AuthPage = ({ view, setView, setUserData }) => {
            const isLogin = view === 'login';
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');

            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true); setError('');
                try {
                    const res = await fetch(isLogin ? '/api/login' : '/api/signup', {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, password })
                    });
                    const data = await res.json();
                    if (res.ok) {
                        setUserData({ username: data.user, role: data.role });
                        setView(data.role === 'admin' ? 'admin' : 'chat');
                    } else setError(data.error);
                } catch (err) { setError('Network Error'); }
                setLoading(false);
            };

            return (
                <div className="min-h-screen flex items-center justify-center bg-slate-50 px-4">
                    <button onClick={() => setView('landing')} className="absolute top-8 left-8 text-slate-500 hover:text-slate-800 font-semibold flex items-center px-4 py-2 bg-white rounded-full shadow-sm border border-slate-200">
                        <Icon name="arrow-left" size={18} className="mr-2" /> Back
                    </button>
                    <div className="max-w-md w-full bg-white p-8 md:p-10 rounded-3xl shadow-xl border border-slate-100">
                        <div className="text-center mb-8">
                            <div className="w-16 h-16 bg-brand-50 text-brand-600 rounded-full flex items-center justify-center mx-auto mb-4 border border-brand-100"><Icon name={isLogin ? "lock-keyhole" : "user-plus"} size={32} /></div>
                            <h2 className="text-3xl font-extrabold text-slate-900">{isLogin ? 'Welcome Back' : 'Create Account'}</h2>
                            <p className="text-slate-500 mt-2 font-medium">Access your personal diagnostic engine.</p>
                        </div>
                        {error && <div className="bg-red-50 text-red-600 p-4 rounded-xl mb-6 text-sm font-semibold flex items-center border border-red-100"><Icon name="triangle-alert" size={18} className="mr-2" /> {error}</div>}
                        <form onSubmit={handleSubmit} className="space-y-5">
                            <div>
                                <label className="block text-sm font-bold text-slate-700 mb-1.5">Username</label>
                                <div className="relative">
                                    <span className="absolute left-4 top-3.5 text-slate-400"><Icon name="user" size={18} /></span>
                                    <input required type="text" value={username} onChange={e => setUsername(e.target.value)} className="w-full pl-11 pr-4 py-3 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:ring-2 focus:ring-brand-500 outline-none transition font-medium" />
                                </div>
                            </div>
                            <div>
                                <label className="block text-sm font-bold text-slate-700 mb-1.5">Password</label>
                                <div className="relative">
                                    <span className="absolute left-4 top-3.5 text-slate-400"><Icon name="key" size={18} /></span>
                                    <input required type="password" value={password} onChange={e => setPassword(e.target.value)} className="w-full pl-11 pr-4 py-3 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:ring-2 focus:ring-brand-500 outline-none transition font-medium" />
                                </div>
                            </div>
                            <button disabled={loading} type="submit" className="w-full bg-brand-900 text-white font-bold py-4 rounded-xl hover:bg-brand-800 transition disabled:opacity-70 mt-4 shadow-md flex justify-center items-center">
                                {loading ? <Icon name="loader-circle" size={20} className="animate-spin" /> : (isLogin ? 'Sign In' : 'Register')}
                            </button>
                        </form>
                        <div className="mt-8 text-center text-sm font-semibold text-slate-500">
                            {isLogin ? "Don't have an account? " : "Already have an account? "}
                            <button onClick={() => setView(isLogin ? 'signup' : 'login')} className="text-brand-600 hover:underline">{isLogin ? 'Sign Up' : 'Log In'}</button>
                        </div>
                    </div>
                </div>
            );
        };

        const DiagnosticWizard = ({ onComplete, onCancel }) => {
            const [step, setStep] = useState(1);
            const [data, setData] = useState({ symptoms: [], severity: '', duration: '', history: [] });

            const SYMPTOMS_LIST = ["Headache", "Fever", "Cough", "Sore Throat", "Fatigue", "Muscle Ache", "Nausea", "Vomiting", "Diarrhea", "Chest Pain", "Shortness of Breath"];
            const SEVERITY_LIST = ["Mild", "Moderate", "Severe"];
            const DURATION_LIST = ["Less than 24 hours", "1-3 days", "About a week", "More than a week"];
            const HISTORY_LIST = ["None", "Hypertension", "Diabetes", "Asthma", "Heart Disease"];

            const toggleArrayItem = (field, item) => {
                setData(prev => {
                    const arr = prev[field];
                    if (arr.includes(item)) return { ...prev, [field]: arr.filter(i => i !== item) };
                    if (item === "None" && field === "history") return { ...prev, [field]: ["None"] }; 
                    const newArr = prev[field].filter(i => i !== "None"); 
                    return { ...prev, [field]: [...newArr, item] };
                });
            };

            const renderChips = (options, field, multi = true) => (
                <div className="flex flex-wrap gap-2 mt-3">
                    {options.map(opt => {
                        const isSelected = multi ? data[field].includes(opt) : data[field] === opt;
                        return (
                            <button key={opt} onClick={() => multi ? toggleArrayItem(field, opt) : setData({...data, [field]: opt})}
                                className={`px-4 py-2 rounded-full text-sm font-semibold transition border ${isSelected ? 'bg-brand-600 text-white border-brand-600 shadow-md' : 'bg-white text-slate-600 border-slate-200 hover:border-brand-300 hover:bg-brand-50'}`}>
                                {opt}
                            </button>
                        );
                    })}
                </div>
            );

            return (
                <div className="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm my-4 animate-fade-in w-full max-w-[85%] sm:max-w-[75%]">
                    <div className="flex items-center justify-between mb-4 border-b border-slate-100 pb-3">
                        <h4 className="font-bold text-slate-800 flex items-center"><Icon name="clipboard-list" size={18} className="mr-2 text-brand-500" /> Offline Diagnostic Wizard</h4>
                        <span className="text-xs font-bold text-slate-400 bg-slate-100 px-2 py-1 rounded-md">Step {step} of 4</span>
                    </div>

                    {step === 1 && (<div><p className="text-slate-600 text-sm font-medium">Select your current symptoms (Choose all that apply):</p>{renderChips(SYMPTOMS_LIST, 'symptoms', true)}</div>)}
                    {step === 2 && (<div><p className="text-slate-600 text-sm font-medium">How severe are your symptoms?</p>{renderChips(SEVERITY_LIST, 'severity', false)}</div>)}
                    {step === 3 && (<div><p className="text-slate-600 text-sm font-medium">How long have you had these symptoms?</p>{renderChips(DURATION_LIST, 'duration', false)}</div>)}
                    {step === 4 && (<div><p className="text-slate-600 text-sm font-medium">Any relevant medical history? (Choose all that apply):</p>{renderChips(HISTORY_LIST, 'history', true)}</div>)}

                    <div className="flex justify-between items-center mt-6 pt-4 border-t border-slate-100">
                        <button onClick={onCancel} className="text-sm font-semibold text-slate-400 hover:text-slate-700">Cancel</button>
                        <div className="space-x-2">
                            {step > 1 && <button onClick={() => setStep(step - 1)} className="px-4 py-2 rounded-lg bg-slate-100 text-slate-600 text-sm font-bold hover:bg-slate-200 transition">Back</button>}
                            <button
                                disabled={(step===1 && data.symptoms.length===0) || (step===2 && !data.severity) || (step===3 && !data.duration) || (step===4 && data.history.length===0)}
                                onClick={() => step < 4 ? setStep(step + 1) : onComplete(data)}
                                className="px-4 py-2 rounded-lg bg-brand-600 text-white text-sm font-bold hover:bg-brand-700 disabled:opacity-50 transition shadow-sm">
                                {step < 4 ? 'Next Step' : 'Analyze Results'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const ChatInterface = ({ userData, setView, setUserData }) => {
            const [messages, setMessages] = useState([{ role: 'model', type: 'text', text: `Hello ${userData.username}. I am MediBot. You can describe your symptoms in the chat using the **Gemini AI Engine**, or use the **Offline Built-in Engine** for a guided diagnostic form.`, source: 'system' }]);
            const [input, setInput] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [engine, setEngine] = useState('gemini'); 
            const [wizardActive, setWizardActive] = useState(false);
            const messagesEndRef = useRef(null);

            useEffect(() => messagesEndRef.current?.scrollIntoView({ behavior: "smooth" }), [messages, isLoading, wizardActive]);

            const parseMarkdown = (text) => {
                let html = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\*(.*?)\*/g, '<em>$1</em>').replace(/_(.*?)_/g, '<em>$1</em>').replace(/\n/g, '<br/>');
                return { __html: html };
            };

            const handleSendText = async (textOverride = null) => {
                const textToSend = textOverride || input;
                if (!textToSend.trim() || isLoading) return;
                setInput('');

                const userMsg = { role: 'user', type: 'text', text: textToSend.trim() };
                const updatedMessages = [...messages, userMsg];
                setMessages(updatedMessages);
                setIsLoading(true);

                try {
                    const res = await fetch('/api/chat', {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ engine: 'gemini', messages: updatedMessages })
                    });
                    const data = await res.json();

                    if (res.ok) {
                        setMessages(prev => [...prev, { role: 'model', type: 'text', text: data.response, source: data.source }]);
                    } else {
                        setMessages(prev => [...prev, { role: 'model', type: 'error', text: data.error, fallback: data.fallback_available }]);
                    }
                } catch (e) {
                    setMessages(prev => [...prev, { role: 'model', type: 'error', text: 'Network connection failed.', fallback: true }]);
                }
                setIsLoading(false);
            };

            const handleWizardComplete = async (wizardData) => {
                setWizardActive(false);
                const summaryText = `[Form Submitted] Symptoms: ${wizardData.symptoms.join(', ')} | Severity: ${wizardData.severity} | Duration: ${wizardData.duration} | History: ${wizardData.history.join(', ')}`;
                const userMsg = { role: 'user', type: 'wizard_response', text: summaryText };
                setMessages(prev => [...prev, userMsg]);
                setIsLoading(true);

                try {
                    const res = await fetch('/api/chat', {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ engine: 'builtin', builtin_data: wizardData })
                    });
                    const data = await res.json();
                    if (res.ok) {
                        setMessages(prev => [...prev, { role: 'model', type: 'text', text: data.response, source: data.source }]);
                    } else setMessages(prev => [...prev, { role: 'model', type: 'error', text: 'Built-in engine error.', fallback: false }]);
                } catch(e) {
                    setMessages(prev => [...prev, { role: 'model', type: 'error', text: 'Network error.', fallback: false }]);
                }
                setIsLoading(false);
            };

            return (
                <div className="flex flex-col h-screen bg-slate-50">
                    <header className="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center z-10 shadow-sm sticky top-0">
                        <div className="flex items-center space-x-3">
                            <div className="w-10 h-10 bg-brand-600 rounded-xl flex items-center justify-center text-white shadow-md"><Icon name="stethoscope" size={20} /></div>
                            <div>
                                <h1 className="font-extrabold text-slate-900 text-lg leading-tight">MediBot</h1>
                                <div className="text-[10px] font-bold text-slate-400 uppercase tracking-wider flex items-center">
                                    <span className={`w-2 h-2 rounded-full mr-1.5 ${engine === 'gemini' ? 'bg-emerald-500 animate-pulse' : 'bg-brand-500'}`}></span>
                                    {engine === 'gemini' ? 'Gemini AI Active' : 'Offline NLP Active'}
                                </div>
                            </div>
                        </div>

                        <div className="hidden md:flex bg-slate-100 p-1 rounded-xl border border-slate-200">
                            <button onClick={() => setEngine('gemini')} className={`flex items-center px-4 py-1.5 rounded-lg text-sm font-bold transition ${engine === 'gemini' ? 'bg-white text-brand-700 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}><Icon name="brain-circuit" size={16} className="mr-2" /> Gemini AI</button>
                            <button onClick={() => setEngine('builtin')} className={`flex items-center px-4 py-1.5 rounded-lg text-sm font-bold transition ${engine === 'builtin' ? 'bg-white text-brand-700 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}><Icon name="server" size={16} className="mr-2" /> Built-in Engine</button>
                        </div>

                        <div className="flex items-center space-x-3">
                            {userData.role === 'admin' && (
                                <button onClick={() => setView('admin')} className="text-slate-500 hover:text-brand-600 bg-slate-100 hover:bg-brand-50 p-2.5 rounded-full transition"><Icon name="shield-check" size={20} /></button>
                            )}
                            <button onClick={() => {setUserData(null); setView('landing');}} className="text-slate-500 hover:text-red-600 bg-slate-100 hover:bg-red-50 p-2.5 rounded-full transition"><Icon name="log-out" size={20} /></button>
                        </div>
                    </header>

                    <div className="bg-amber-50 border-b border-amber-200 text-amber-800 text-xs px-6 py-2.5 flex items-center justify-center font-medium">
                        <Icon name="triangle-alert" size={16} className="mr-2 text-amber-600" /> <strong>Not a substitute for professional medical advice.</strong> In emergencies, call emergency services immediately.
                    </div>

                    <main className="flex-1 overflow-y-auto p-4 sm:p-6 flex flex-col w-full max-w-4xl mx-auto space-y-6">
                        {messages.map((msg, idx) => {
                            const isUser = msg.role === 'user';
                            return (
                                <div key={idx} className={`flex ${isUser ? 'justify-end' : 'justify-start'}`}>
                                    <div className={`flex items-end max-w-[85%] sm:max-w-[75%] ${isUser ? 'flex-row-reverse' : 'flex-row'} gap-3`}>
                                        <div className={`w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0 shadow-sm ${isUser ? 'bg-brand-600 text-white' : 'bg-white border border-slate-200 text-brand-600'}`}>
                                            <Icon name={isUser ? "user" : "bot"} size={16} />
                                        </div>

                                        <div className="flex flex-col">
                                            {msg.type === 'text' || msg.type === 'wizard_response' ? (
                                                <div className={`rounded-2xl px-5 py-3.5 shadow-sm text-sm ${isUser ? 'bg-brand-600 text-white rounded-br-sm' : 'bg-white border border-slate-200 text-slate-800 rounded-bl-sm markdown'}`} dangerouslySetInnerHTML={parseMarkdown(msg.text)}></div>
                                            ) : null}

                                            {msg.type === 'error' && (
                                                <div className="bg-red-50 border border-red-200 rounded-2xl rounded-bl-sm px-5 py-3.5 shadow-sm">
                                                    <p className="text-sm font-semibold text-red-800 mb-2 flex items-center"><Icon name="circle-x" size={16} className="mr-2" /> {msg.text}</p>
                                                    {msg.fallback && (
                                                        <button onClick={() => { setEngine('builtin'); setWizardActive(true); }} className="mt-2 bg-white border border-slate-300 text-slate-700 px-4 py-2 rounded-lg text-xs font-bold shadow-sm hover:bg-slate-50 transition flex items-center">
                                                            <Icon name="server" size={14} className="mr-2 text-brand-600" /> Switch to Offline Built-in Engine
                                                        </button>
                                                    )}
                                                </div>
                                            )}

                                            {!isUser && msg.source && msg.type !== 'error' && msg.source !== 'system' && (
                                                <span className="text-[10px] font-bold text-slate-400 mt-1 flex items-center uppercase tracking-wider ml-1">
                                                    {msg.source === 'builtin-nlp' ? <><Icon name="server" size={10} className="mr-1 text-emerald-500" /> Offline NLP Engine</> :
                                                     msg.source === 'offline-db' ? <><Icon name="database" size={10} className="mr-1 text-blue-500" /> Cached DB Answer</> :
                                                     <><Icon name="brain-circuit" size={10} className="mr-1 text-purple-500" /> Gemini AI Generated</>}
                                                </span>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            );
                        })}

                        {wizardActive && engine === 'builtin' && (
                             <div className="flex justify-start"><DiagnosticWizard onComplete={handleWizardComplete} onCancel={() => setWizardActive(false)} /></div>
                        )}

                        {isLoading && (
                            <div className="flex justify-start">
                                <div className="flex items-end gap-3 max-w-[85%]">
                                    <div className="w-8 h-8 rounded-full bg-white border border-slate-200 text-brand-600 flex items-center justify-center flex-shrink-0"><Icon name="bot" size={16} /></div>
                                    <div className="bg-white border border-slate-200 shadow-sm rounded-2xl rounded-bl-sm px-5 py-4 w-20 flex justify-center items-center h-10">
                                        <div className="flex space-x-1">
                                            <div className="w-1.5 h-1.5 bg-slate-400 rounded-full typing-dot"></div>
                                            <div className="w-1.5 h-1.5 bg-slate-400 rounded-full typing-dot"></div>
                                            <div className="w-1.5 h-1.5 bg-slate-400 rounded-full typing-dot"></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                        <div ref={messagesEndRef} />
                    </main>

                    <footer className="bg-white p-4 border-t border-slate-200 sticky bottom-0 z-10 shadow-[0_-4px_20px_rgba(0,0,0,0.02)]">
                        <div className="max-w-4xl mx-auto relative flex flex-col gap-2">
                            <div className="md:hidden flex justify-between items-center mb-1">
                                <span className="text-xs font-bold text-slate-500">Engine: <span className="text-brand-600">{engine === 'gemini' ? 'Gemini AI' : 'Offline NLP'}</span></span>
                                <button onClick={() => setEngine(engine === 'gemini' ? 'builtin' : 'gemini')} className="text-xs font-bold text-brand-500 border border-brand-200 px-2 py-0.5 rounded-md">Switch</button>
                            </div>

                            {engine === 'builtin' && !wizardActive && (
                                <button onClick={() => setWizardActive(true)} className="w-full bg-brand-50 border border-brand-200 text-brand-700 font-bold py-3.5 rounded-xl hover:bg-brand-100 transition shadow-sm flex justify-center items-center">
                                    <Icon name="clipboard-plus" size={18} className="mr-2" /> Start Structured Diagnosis Form
                                </button>
                            )}

                            {engine === 'gemini' && (
                                <div className="relative flex items-center">
                                    <input type="text" value={input} onChange={(e) => setInput(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && handleSendText()} placeholder="Describe your symptoms in natural language..." disabled={isLoading} className="w-full bg-slate-50 border border-slate-200 shadow-inner rounded-full pl-6 pr-14 py-4 focus:outline-none focus:ring-2 focus:ring-brand-500 font-medium text-sm transition" />
                                    <button onClick={() => handleSendText()} disabled={!input.trim() || isLoading} className={`absolute right-2 w-11 h-11 rounded-full flex items-center justify-center transition-all ${input.trim() && !isLoading ? 'bg-brand-600 text-white shadow-md transform hover:scale-105' : 'bg-slate-200 text-slate-400'}`}>
                                        <Icon name="send" size={18} />
                                    </button>
                                </div>
                            )}
                        </div>
                    </footer>
                </div>
            );
        };

        const AdminDashboard = ({ userData, setView, setUserData }) => {
            const [kbEntries, setKbEntries] = useState([]);
            const [loading, setLoading] = useState(true);

            const fetchKB = async () => {
                setLoading(true);
                try { const res = await fetch('/api/admin/kb'); setKbEntries(await res.json()); } catch(e) {}
                setLoading(false);
            };
            useEffect(() => { fetchKB(); }, []);

            const handleDelete = async (id) => {
                if(confirm('Delete this entry?')) { await fetch(`/api/admin/kb/${id}`, { method: 'DELETE' }); fetchKB(); }
            };

            return (
                <div className="flex h-screen bg-slate-50 font-sans">
                    <aside className="w-64 bg-slate-900 text-slate-300 flex-col hidden md:flex">
                        <div className="p-6 border-b border-slate-800">
                            <div className="flex items-center space-x-3 text-white mb-2"><Icon name="shield-check" size={28} /><h1 className="font-extrabold text-xl">Admin Panel</h1></div>
                            <p className="text-slate-500 text-xs font-bold">MediBot DB Console</p>
                        </div>
                        <nav className="flex-1 p-4 space-y-2">
                            <div className="flex items-center px-4 py-3 bg-brand-600 text-white rounded-xl font-semibold shadow-md"><Icon name="database" size={18} className="mr-3" /> Database</div>
                            <button onClick={() => setView('chat')} className="w-full flex items-center px-4 py-3 hover:bg-slate-800 hover:text-white rounded-xl font-semibold transition"><Icon name="message-square" size={18} className="mr-3" /> Back to Chat</button>
                        </nav>
                    </aside>
                    <main className="flex-1 flex flex-col h-full overflow-hidden">
                        <header className="md:hidden bg-slate-900 text-white p-4 flex justify-between items-center">
                            <h1 className="font-extrabold flex items-center"><Icon name="shield-check" size={20} className="mr-2"/> Admin</h1>
                            <button onClick={() => setView('chat')} className="p-2 bg-slate-800 rounded"><Icon name="message-square" size={18}/></button>
                        </header>
                        <div className="p-6 md:p-8 flex-1 overflow-y-auto">
                            <h2 className="text-2xl font-extrabold text-slate-900 mb-6">Knowledge Base & Cache</h2>
                            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                                <table className="w-full text-left border-collapse text-sm">
                                    <thead>
                                        <tr className="bg-slate-50 text-slate-600 border-b border-slate-200">
                                            <th className="p-4 font-bold w-32">Source</th>
                                            <th className="p-4 font-bold w-1/3">Prompt</th>
                                            <th className="p-4 font-bold">Answer</th>
                                            <th className="p-4 font-bold text-right">Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100">
                                        {loading ? <tr><td colSpan="4" className="p-8 text-center text-slate-500">Loading...</td></tr> : kbEntries.map(entry => (
                                            <tr key={entry.id} className="hover:bg-slate-50">
                                                <td className="p-4 align-top"><span className="px-2 py-1 bg-slate-100 text-slate-600 rounded text-xs font-bold uppercase">{entry.source}</span></td>
                                                <td className="p-4 align-top font-semibold text-slate-800">{entry.question}</td>
                                                <td className="p-4 align-top text-slate-600"><div className="line-clamp-3">{entry.answer}</div></td>
                                                <td className="p-4 align-top text-right"><button onClick={() => handleDelete(entry.id)} className="p-2 text-red-500 hover:bg-red-50 rounded-lg"><Icon name="trash-2" size={18} /></button></td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const App = () => {
            const [view, setView] = useState('landing');
            const [userData, setUserData] = useState(null);
            if (view === 'landing') return <LandingPage setView={setView} />;
            if (view === 'login' || view === 'signup') return <AuthPage view={view} setView={setView} setUserData={setUserData} />;
            if (view === 'chat' && userData) return <ChatInterface userData={userData} setView={setView} setUserData={setUserData} />;
            if (view === 'admin' && userData?.role === 'admin') return <AdminDashboard userData={userData} setView={setView} setUserData={setUserData} />;
            return <LandingPage setView={setView} />;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
